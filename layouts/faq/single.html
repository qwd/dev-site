{{ define "main" }}
<section class="tw:mb-12 tw:pt-12 tw:pb-8 tw:text-center tw:bg-[#7482A9] tw:bg-[linear-gradient(60deg,#5A9CBE,#7482A9,#694F97)]"><div class="qw-container"><h1 class="tw:text-white tw:mb-12 tw:tracking-[1px]">{{ .Title }}</h1><p class="tw:text-center tw:text-[#ebebeb]">{{ .Description }}</p></div></section>

  <div class="tw:rounded-card tw:[&_h2]:mt-16 tw:[&_h2]:pb-4 tw:[&_h2]:border-b tw:[&_h2]:border-[#ebebeb] tw:[&_h3]:mt-12 tw:[&_h3]:text-lg">{{ .Content }}</div>
</section></div></main>
{{ end }}

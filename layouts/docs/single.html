{{ define "main" }}
  {{ partial "docs/breadcrumbs.html" . }}
  <div class="main-content tw:w-full tw:flex tw:px-6 tw:pb-16">
    <aside class="docs-nav tw:min-w-[180px] tw:border-r tw:border-[#dfdfdf] tw:text-sm tw:hidden tw:md:block tw:shrink-0 tw:pt-12 tw:pb-6 tw:pr-6 tw:mr-8">
      {{ partial "docs/nav.html" . }}
    </aside>
    <article class="article tw:pt-8 tw:flex-1 tw:min-w-0">
      <div class="qw-container">
        <div class="tw:flex tw:flex-wrap tw:-mx-6">
          <div class="tw:w-full tw:lg:w-10/12 tw:px-6 tw:py-6 tw:min-w-0 tw:border tw:border-[#dfdfdf] tw:rounded-card">
            <section class="article-headline tw:leading-none tw:mb-12 tw:pb-6 tw:border-b tw:border-[#ebebeb]">
              <h1 class="tw:mr-4 tw:inline-block">{{ .Title }}</h1>
            </section>
            <section class="doc-content tw:[&_img]:my-4 tw:[&_img]:block tw:[&_img]:h-auto tw:[&_img]:max-w-full tw:[&_li]:mb-2 tw:[&_li_ul]:mt-4">{{ .Content }}</section>
          </div>
          {{ if and (ne .Params.toc false) (ne .Type "docs-overview") }}
          <aside class="docs-toc tw:sticky tw:top-[61px] tw:z-10 tw:self-start tw:text-sm tw:lg:w-2/12 tw:px-6 tw:hidden tw:lg:block tw:[&_ul]:list-none tw:[&_ul]:p-0 tw:[&_ul]:mt-0 tw:[&_ul]:mb-0 tw:[&_li]:mb-2 tw:[&_li>ul]:pl-4 tw:[&_li>ul]:mt-2 tw:[&_ul:last-child]:mb-0 tw:[&_li:last-child]:mb-0">
            <h4 class="tw:mb-4">{{ T "tocnav" }}</h4>
            {{ .TableOfContents }}
          </aside>
          {{ end }}
        </div>
      </div>
    </article>
  </div>
{{ end }}

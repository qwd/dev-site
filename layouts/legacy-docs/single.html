{{ define "main" }}
  {{ partial "docs/breadcrumbs.html" . }}
  <div class="main-content tw:w-full tw:flex tw:px-[15px] tw:pb-10">
    <aside class="docs-nav tw:min-w-[180px] tw:border-r tw:border-[#dfdfdf] tw:text-sm tw:hidden tw:md:block tw:shrink-0 tw:pt-[30px] tw:pb-[15px] tw:pr-[15px] tw:mr-5">
      {{ partial "docs/nav.html" . }}
    </aside>
    <article class="article tw:pt-5 tw:flex-1 tw:min-w-0">
      <div class="qw-container">
        <div class="tw:flex tw:flex-wrap tw:-mx-[15px]">
          <div class="tw:w-full tw:lg:w-10/12 tw:px-[15px] tw:py-[15px] tw:min-w-0 tw:border tw:border-[#dfdfdf] tw:rounded-[10px]">
            <section class="article-headline tw:leading-none tw:mb-[30px] tw:pb-[15px] tw:border-b tw:border-[#ebebeb]">
              <h1 class="tw:mr-2.5 tw:inline-block">{{ .Title }}</h1>
            </section>
            <section class="doc-content">{{ .Content }}</section>
          </div>
        </div>
      </div>
    </article>
  </div>
{{ end }}

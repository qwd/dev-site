{{- $translations := .AllTranslations -}}
<select class="tw:min-h-12 tw:rounded-[5px] tw:border tw:border-qw-muted tw:bg-white tw:px-4 tw:py-[4px] tw:text-qw-text tw:leading-normal" id="change-language" onchange="if (this.value) window.location.href=this.value">
  {{- range hugo.Sites }}
    {{- $site := . -}}
    {{- $target := $site.Home.RelPermalink -}}
    {{- range $translations }}
      {{- if eq .Language.Lang $site.Language.Lang }}{{ $target = .RelPermalink }}{{ end -}}
    {{- end }}
  <option value="{{ $target }}"{{ if eq $.Language.Lang $site.Language.Lang }} selected="selected"{{ end }}>{{ $site.Language.Label }}</option>
  {{- end }}
</select>

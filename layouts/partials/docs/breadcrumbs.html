<section class="doc-bc tw:bg-[#231815] tw:min-h-[40px] tw:leading-[20px] tw:text-sm tw:hidden tw:sm:block tw:sticky tw:top-0 tw:z-10">
  <div class="tw:w-full tw:px-6">
    <ul class="tw:list-none tw:p-0 tw:m-0 tw:flex">
      {{ range where .Ancestors.Reverse "IsHome" false }}
      <li class="tw:py-4 tw:mr-2"><a class="tw:inline-block tw:hover:no-underline tw:[font-weight:lighter]" href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
      <li class="tw:py-4 tw:mr-2 active"><a class="tw:inline-block tw:hover:no-underline tw:[font-weight:lighter]" href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    </ul>
  </div>
</section>
<section class="doc-bc-mobile tw:sticky tw:top-0 tw:z-10 tw:block tw:sm:hidden">
  <div class="tw:w-full tw:px-6">
      <select class="tw:min-h-[30px] tw:text-[#ebebeb] tw:bg-[rgba(17,17,17,0.85)] tw:w-full tw:p-[10px] tw:mt-[10px] tw:rounded-card tw:leading-[20px]" onchange="if (this.value) window.location.href=this.value">
      <option value="">{{ T "docs-category" }}</option>
      {{- $current := . -}}
      {{- $docsNav := index hugo.Data "docs-nav" -}}
      {{- range $docsNav }}
        {{- $section := . -}}
        {{- $overview := partial "docs/page-by-key.html" (dict "site" $current.Site "key" .key) -}}
        {{- with $overview }}
      <optgroup label="{{ .Title }}">
          {{- range $section.subitems }}
            {{- $page := partial "docs/page-by-key.html" (dict "site" $current.Site "key" .key) -}}
            {{- with $page }}
        <option value="{{ .RelPermalink }}"{{ if eq .RelPermalink $current.RelPermalink }} selected{{ end }}>{{ .Title }}</option>
            {{- end }}
          {{- end }}
      </optgroup>
        {{- end }}
      {{- end }}
    </select>
  </div>
</section>

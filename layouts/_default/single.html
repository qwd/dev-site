{{ define "main" }}
  <div class="main-content tw:w-full tw:flex tw:px-[15px] tw:pb-10">
    <article class="article tw:pt-5 qw-container">
        <div class="tw:flex tw:flex-wrap">
            <div class="article-headline tw:mb-[30px] tw:pb-[15px] tw:border-b tw:border-[#ebebeb] tw:w-full">
              <h1 class="tw:mr-2.5 tw:inline-block">{{ .Title }}</h1>
            </div>
            <section class="doc-content">{{ .Content }}</section>
        </div>
    </article>
  </div>
{{ end }}

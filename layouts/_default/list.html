{{ define "main" }}
  <section class="qw-container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="tw:text-xl tw:[font-weight:lighter]">{{ . }}</p>{{ end }}
    {{ .Content }}
    <ul>
      {{ range .Pages.ByTitle }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </section>
{{ end }}

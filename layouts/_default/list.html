{{ define "main" }}
  <section class="tw:mx-auto tw:max-w-[1140px] tw:px-6">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
    {{ .Content }}
    <ul>
      {{ range .Pages.ByTitle }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </section>
{{ end }}

---
openapi: 3.0.0
info:
  title: 和风天气开发者服务 APIs
  description: |
   和风天气 API 列表

   *如需调试，必须输入完整的 API Host 和凭据（API Key 或 JWT Token）*
  version: latest
  termsOfService: https://www.qweather.com/terms/developers-eula
  contact:
    name: 和风天气开发者服务
    url: https://dev.qweather.com
  license:
    name: 开发者许可协议
    url: https://www.qweather.com/terms/developers-eula
servers:
- url: https://{API Host}
  description: 在下方填写你的API Host
  variables:
    API Host:
      default: 'abc.xyz.qweatherapi.com'
      description: 在控制台设置中查看你的API Host。
security:
- jwt: []
- apiKey: []
tags:
- name: Geo
  description: 坐标反查以及城市搜索
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/geoapi/
- name: Weather
  description: 指定地点的天气数据
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/weather/
- name: Weather Alert
  description: 极端天气预警
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/warning/
- name: Air Quality
  description: 指定地点的空气质量数据
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/air-quality/
- name: Storm
  description: 中国附近海域台风数据
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/tropical-cyclone/
- name: Ocean
  description: 全球主要港口和城市的潮汐数据
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/ocean/
- name: Solar Irradiation
  description: 网格化太阳辐照预报。
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/solar-radiation/
- name: Astronomy
  description: 指定地点的天文数据
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/astronomy/
- name: Console
  description: 控制台API
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/docs/api/console/
paths:
  "/geo/v2/city/lookup":
    get:
      operationId: getGeoCitylookup
      summary: 城市搜索
      description: "城市搜索API提供全球地理位位置、全球城市搜索服务，支持经纬度坐标反查、多语言、模糊搜索等功能。\n\n天气数据是基于地理位置的数据，因此获取天气之前需要先知道具体的位置信息。使用城市搜索，可获取到该城市的基本信息，包括城市的Location ID（你需要这个ID去查询天气），多语言名称、经纬度、时区、海拔、Rank值、归属上级行政区域、所在行政区域等。 \n\n另外，城市搜索也可以帮助你在你的APP中实现模糊搜索，用户只需要输入1-2个字即可获得结果。"
      tags:
      - Geo
      externalDocs:
        url: https://dev.qweather.com/docs/api/geoapi/city-lookup/
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/admQuery"
      - "$ref": "#/components/parameters/rangeQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getCityLookup"
              examples:
                response:
                  externalValue: "./examples/getGeoCitylookup-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/geo/v2/poi/lookup":
    get:
      operationId: getGeoPoilookup
      summary: POI搜索
      description: 使用关键字和坐标查询POI信息（景点、火车站、飞机场、港口等）
      externalDocs:
        url: https://dev.qweather.com/docs/api/geoapi/poi-lookup/
      tags:
      - Geo
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/poiTypeQuery"
      - "$ref": "#/components/parameters/poiCityQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getPoiLookup"
              examples:
                response:
                  externalValue: "./examples/getGeoPoilookup-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/now":
    get:
      operationId: getWeatherNow
      tags:
      - Weather
      summary: 实时天气
      description: |-
        获取中国3000+市县区和海外50万个城市实时天气数据，包括实时温度、体感温度、风力风向、相对湿度、大气压强、降水量、能见度、露点温度、云量等。

        > **注意：** 实况数据均为近实时数据，相比真实的物理世界有5-20分钟的延迟，请根据实况数据中的`obsTime`确定数据对应的准确时间。
      externalDocs:
        url: https://dev.qweather.com/docs/api/weather/weather-now/
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherNow"
              examples:
                response:
                  externalValue: "./examples/getWeatherNow-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/{days}":
    get:
      operationId: getWeatherDailyForecast
      tags:
      - Weather
      summary: 每日天气预报
      description: 每日天气预报API，提供全球城市未来3-30天天气预报，包括：日出日落、月升月落、最高最低温度、天气白天和夜间状况、风力、风速、风向、相对湿度、站点气压、降水量、露点温度、紫外线强度、能见度等。
      externalDocs:
        url: https://dev.qweather.com/docs/api/weather/weather-daily-forecast/
      parameters:
      - "$ref": "#/components/parameters/days30Path"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherDaily"
              examples:
                response:
                  externalValue: "./examples/getWeatherDailyForecast-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/{hours}":
    get:
      operationId: getWeatherHourlyForecast
      tags:
      - Weather
      summary: 逐小时天气预报
      description: 逐小时天气预报API，提供全球城市未来24-168小时逐小时天气预报，包括：温度、天气状况、风力、风速、风向、相对湿度、站点气压、降水概率、露点温度、云量。
      externalDocs:
        url: https://dev.qweather.com/docs/api/weather/weather-hourly-forecast/
      parameters:
      - "$ref": "#/components/parameters/hours168Path"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherHourly"
              examples:
                response:
                  externalValue: "./examples/getWeatherHourlyForecast-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/minutely/5m":
    get:
      operationId: getMinutelyPrecipitation
      tags:
      - Weather
      summary: 分钟级降水
      description: 分钟级降水API（临近预报）支持中国1公里精度的未来2小时每5分钟降雨预报数据。
      externalDocs:
        url: https://dev.qweather.com/docs/api/minutely/minutely-precipitation/
      parameters:
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getMinutely"
              examples:
                response:
                  externalValue: "./examples/getMinutelyPrecipitation-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/indices/{days}":
    get:
      operationId: getWeatherIndices
      tags:
      - Weather
      summary: 天气指数预报
      description: |-
        获取中国和全球城市天气生活指数预报数据。

        - 中国天气生活指数：舒适度指数、洗车指数、穿衣指数、感冒指数、运动指数、旅游指数、紫外线指数、空气污染扩散条件指数、空调开启指数、过敏指数、太阳镜指数、化妆指数、晾晒指数、交通指数、钓鱼指数、防晒指数
        - 海外天气生活指数：运动指数、洗车指数、紫外线指数、钓鱼指数
      externalDocs:
        url: https://dev.qweather.com/docs/api/indices/indices-forecast/
      parameters:
      - "$ref": "#/components/parameters/days3Path"
      - "$ref": "#/components/parameters/indexTypeQuery"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherIndex"
              examples:
                response:
                  externalValue: "./examples/getWeatherIndices-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/weatheralert/v1/current/{latitude}/{longitude}":
    get:
      operationId: getWeatherAlertCurrent
      tags:
      - Weather Alert
      summary: 实时天气预警
      description: 根据指定的经纬度坐标，查询中国和全球正在生效的官方天气预警信息。阅读[实用资料-预警](https://dev.qweather.com/docs/resource/warning-info/)以了解预警信息支持的国家和地区、事件类型等必要信息。
      externalDocs:
        url: https://dev.qweather.com/docs/api/warning/weather-alert/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/localtimeQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAlert"
              examples:
                response:
                  externalValue: "./examples/getWeatherAlertCurrent-zh.json"
  "/v7/warning/now":
    get:
      operationId: getWarningNow
      tags:
      - Weather Alert
      summary: 实时天气预警
      description: 该接口已弃用，自2026年9月1日停止服务。请使用 /weatheralert/v1/current/ 代替
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWarning"
              examples:
                response:
                  externalValue: "./examples/getWarningNow-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/current/{latitude}/{longitude}":
    get:
      operationId: getAirqualityCurrent
      tags:
      - Air Quality
      summary: 实时空气质量
      description: |-
        实时空气质量API提供指定地点的实时空气质量数据，精度为1x1公里。

        - 基于各个国家或地区当地标准的AQI、AQI等级、颜色和首要污染物
        - 和风天气通用AQI
        - 污染物浓度值、分指数
        - 健康建议
        - 相关联的监测站信息

        我们推荐阅读[空气质量信息文档](https://dev.qweather.com/docs/resource/air-info/)，以便了解指数类型、污染物、支持的国家等信息。
      externalDocs:
        url: https://dev.qweather.com/docs/api/air-quality/air-current/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityCurrent"
              examples:
                response:
                  externalValue: "./examples/getAirqualityCurrent.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/daily/{latitude}/{longitude}":
    get:
      operationId: getAirqualityDailyForecast
      tags:
      - Air Quality
      summary: 空气质量每日预报
      description: |-
        空气质量每日预报API提供未来3天的空气质量（AQI）预报、污染物浓度值和健康建议。

        我们推荐阅读[空气质量信息文档](https://dev.qweather.com/docs/resource/air-info/)，以便了解AQI的类型、污染物、支持的国家等信息。
      externalDocs:
        url: https://dev.qweather.com/docs/api/air-quality/air-daily-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityDaily"
              examples:
                response:
                  externalValue: "./examples/getAirqualityDailyForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/hourly/{latitude}/{longitude}":
    get:
      operationId: getAirqualityHourlyForecast
      tags:
      - Air Quality
      summary: 空气质量小时预报
      description: |-
        空气质量小时预报API提供未来24小时空气质量的数据，包括AQI、污染物浓度、分指数以及健康建议。

        我们推荐阅读[空气质量信息文档](https://dev.qweather.com/docs/resource/air-info/)，以便了解AQI的类型、污染物、支持的国家等信息。
      externalDocs:
        url: https://dev.qweather.com/docs/api/air-quality/air-hourly-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityHourly"
              examples:
                response:
                  externalValue: "./examples/getAirqualityHourlyForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/stations/{locationId}":
    get:
      operationId: getAirqualityAirStation
      tags:
      - Air Quality
      summary: 监测站数据
      description: |-
        监测站数据API提供各个国家或地区监测站的污染物浓度值。

        > **警告：** 监测站的观测值仅供参考，可能由于故障、移除、维护或当地法律法规等各种原因导致数据延迟或缺失，我们无法确保该数据的可用性。
        {.bqdanger}
      externalDocs:
        url: https://dev.qweather.com/docs/api/air-quality/air-station/
      parameters:
      - "$ref": "#/components/parameters/airStationIdPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirStation"
              examples:
                response:
                  externalValue: "./examples/getAirqualityAirStation.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/air/now":
    get:
      operationId: getAirNowV7
      tags:
      - Air Quality
      summary: 中国城市实时空气质量（已弃用）
      description: 该接口已弃用，自2026年6月1日停止服务。请使用 /airquality/v1/current 代替
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAqiNowV7"
              examples:
                response:
                  externalValue: "./examples/getAirNowV7-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/air/5d":
    get:
      operationId: getAirDailyV7
      tags:
      - Air Quality
      summary: 中国城市空气质量日报（已弃用）
      description: 该接口已弃用，自2026年6月1日停止服务。请使用 /airquality/v1/daily 代替
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAqiDailyV7"
              examples:
                response:
                  externalValue: "./examples/getAirDailyV7-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/tropical/storm-forecast":
    get:
      operationId: getStormForecast
      tags:
      - Storm
      summary: 台风预报
      description: |-
        台风预报API提供全球主要海洋流域的台风预测位置、等级、气压、风速等。

        > 如果查询的台风已经结束，则返回的数据为空，建议先通过[台风列表接口](https://dev.qweather.com/docs/api/tropical-cyclone/storm-list/)获取台风的状态
      externalDocs:
        url: https://dev.qweather.com/docs/api/tropical-cyclone/storm-forecast/
      parameters:
      - "$ref": "#/components/parameters/stormIdQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormForecast"
              examples:
                response:
                  externalValue: "./examples/getStormForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/tropical/storm-track":
    get:
      operationId: getStormTrack
      tags:
      - Storm
      summary: 台风实况和路径
      description: 台风实况和路径API提供全球主要海洋流域的台风实时位置、等级、气压、风速以及活跃台风的轨迹路径。
      externalDocs:
        url: https://dev.qweather.com/docs/api/tropical-cyclone/storm-track/
      parameters:
      - "$ref": "#/components/parameters/stormIdQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormTrack"
              examples:
                response:
                  externalValue: "./examples/getStormTrack.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/tropical/storm-list":
    get:
      operationId: getStormList
      tags:
      - Storm
      summary: 台风列表
      description: |-
        台风列表API提供全球主要海洋流域最近2年的台风列表。

        > 目前仅支持中国沿海地区，即`basin=NP`
      externalDocs:
        url: https://dev.qweather.com/docs/api/tropical-cyclone/storm-list/
      parameters:
      - "$ref": "#/components/parameters/basinQuery"
      - "$ref": "#/components/parameters/stormYearQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormList"
              examples:
                response:
                  externalValue: "./examples/getStormList-zh.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/ocean/tide":
    get:
      operationId: getOceanTide
      tags:
      - Ocean
      summary: 潮汐
      description: 未来10天全球潮汐数据，包括满潮、干潮高度和时间，逐小时潮汐数据。
      externalDocs:
        url: https://dev.qweather.com/docs/api/ocean/tide/
      parameters:
      - "$ref": "#/components/parameters/tideStationIdQuery"
      - "$ref": "#/components/parameters/date10Query"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getTide"
              examples:
                response:
                  externalValue: "./examples/getOceanTide.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/solarradiation/v1/forecast/{latitude}/{longitude}":
    get:
      operationId: getSolarradiationForecast
      tags:
      - Solar Irradiation
      summary: 太阳辐射预报
      description: 获取全球任意坐标的逐15分钟太阳辐射预报及相关数据，最多支持未来60小时预报，分辨率为1x1公里。
      externalDocs:
        url: https://dev.qweather.com/docs/api/solar-radiation/solar-radiation-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/solarRadiationHoursQuery"
      - "$ref": "#/components/parameters/solarRadiationIntervalQuery"
      - "$ref": "#/components/parameters/solarRadiationTiltQuery"
      - "$ref": "#/components/parameters/solarRadiationAzimuthQuery"
      - "$ref": "#/components/parameters/solarRadiationExtraQuery"
      - "$ref": "#/components/parameters/localtimeQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getSolarRadiationForecast"
              examples:
                response:
                  externalValue: "./examples/getSolarradiationForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/solar-radiation/{hours}":
    get:
      operationId: getSolarRadiationV7
      tags:
      - Solar Irradiation
      summary: 太阳辐射数据
      deprecated: true

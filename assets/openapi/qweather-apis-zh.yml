components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "输入完整 Token。[查看 JWT 文档](https://dev.qweather.com/docs/configuration/authentication/#json-web-token)。不要同时使用JWT 和 API KEY。"
    apiKey:
      type: apiKey
      in: header
      name: X-QW-Api-Key
      description: "[查看 API Key 文档](https://dev.qweather.com/docs/configuration/authentication/#api-key)。不要同时使用JWT 和 API KEY。"

  responses:
    defaultError:
      description: Request failed, see [Error Code](https://dev.qweather.com/docs/resource/error-code/).
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              error:
                type: object
                description: 错误详情。
                properties:
                  status:
                    type: number
                    description: 这个错误的HTTP status code。
                    enum: [400, 401, 403, 404, 429, 500]
                  type:
                    type: string
                    description: 一个URL用于标识错误类型，访问URL查看详细错误信息。
                  title:
                    type: string
                    description: 错误的简短描述。
                  detail:
                    type: string
                    description: 错误的详细描述。
                  invalidParams:
                    type: array
                    description: 标识错误或缺失的参数。
                    items:
                      type: string
                      description: 标识错误或缺失的参数，仅限400错误。
  parameters:
    latPath:
      name: latitude
      in: path
      required: true
      description: 所需位置的纬度。十进制，最多支持小数点后两位。例如 `39.92`
      schema:
        type: number
        minimum: -90
        maximum: 90
        example: 39.92
    lonPath:
      name: longitude
      in: path
      description: 所需位置的经度。十进制，最多支持小数点后两位。例如 `116.41`
      required: true
      schema:
        type: number
        minimum: -180
        maximum: 180
        example: 116.41
    airStationIdPath:
      name: locationId
      in: path
      description: 空气质量监测站的LocationID，LocationID可通过[GeoAPI](https://dev.qweather.com/docs/api/geoapi/)获取。例如 `P58911`
      required: true
      schema:
        type: string
        example: P58911
    locationQuery:
      name: location
      in: query
      description: 需要查询地区的[LocationID](https://dev.qweather.com/docs/resource/glossary/#locationid)或以英文逗号分隔的[经度,纬度坐标](https://dev.qweather.com/docs/resource/glossary/#coordinate)（十进制，最多支持小数点后两位），LocationID可通过[GeoAPI](https://dev.qweather.com/docs/api/geoapi/)获取。例如 `location=101010100` 或 `location=116.41,39.92`
      required: true
      schema:
        type: string
        example: 116.41,39.92
    lonlatQuery:
      name: location
      in: query
      description: 需要查询地区的以英文逗号分隔的[经度,纬度坐标](https://dev.qweather.com/docs/resource/glossary/#coordinate)（十进制，最多支持小数点后两位）。例如 `location=116.41,39.92`
      required: true
      schema:
        type: string
        example: 116.41,39.92
    airStationIdQuery:
      name: location
      in: query
      description: 空气质量监测站的[LocationID](https://dev.qweather.com/docs/resource/glossary/#locationid)，例如 `location=P58911`。
      required: true
      schema:
        type: string
        example: P58911
    locationIdQuery:
      name: location
      in: query
      description: 需要查询的地区，仅支持[LocationID](https://dev.qweather.com/docs/resource/glossary/#locationid)，LocationID可通过[GeoAPI](https://dev.qweather.com/docs/api/geoapi/)获取。例如 `location=101010100`
      required: true
      schema:
        type: string
        example: '101010100'
    colorQuery:
      name: color
      in: query
      description: '指定颜色方案，参考[颜色](https://dev.qweather.com/docs/resource/color-pallet)。'
      required: false
      schema:
        type: string
        default: light
        enum: [light, dark, local]
        example: light
    tideStationIdQuery:
      name: location
      in: query
      description: 潮汐观测站的[LocationID](https://dev.qweather.com/docs/resource/glossary/#locationid)，例如 `location=P66981`。
      required: true
      schema:
        type: string
        example: P66981
    admQuery:
      name: adm
      in: query
      description: 城市的上级行政区划，可设定只在某个行政区划范围内进行搜索，用于排除重名城市或对结果进行过滤。例如 `adm=beijing`
      required: false
      schema:
        type: string
        example: beijing
    rangeQuery:
      name: range
      in: query
      description: 搜索范围，可设定只在某个国家或地区范围内进行搜索，国家和地区名称需使用[ISO 3166 所定义的国家代码](https://dev.qweather.com/docs/resource/glossary/#iso-3166)。如果不设置此参数，搜索范围将在所有城市。例如 `range=cn`
      required: false
      schema:
        type: string
        example: cn
    numberQuery:
      name: number
      in: query
      description: 返回结果的数量，取值范围1-20，默认返回10个结果。
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 10
        example: 10
    poiTypeQuery:
      name: type
      description: "POI类型，可选择搜索某一类型的POI。`scenic` 景点，`TSTA` 潮汐站点"
      in: query
      required: true
      schema:
        type: string
        enum: [scenic, CSTA, TSTA]
        example: scenic
    poiCityQuery:
      name: city
      description: 选择POI所在城市，可设定只搜索在特定城市内的POI信息。城市名称可以是文字或城市的LocationID。城市名称为精准匹配，建议使用LocaitonID，如文字无法匹配，则数据返回为空。**默认不限制特定城市**。
      in: query
      required: false
      schema:
        type: string
        example: '101010100'
    langQuery:
      name: lang
      in: query
      description: 多语言设置，请阅读[多语言](https://dev.qweather.com/docs/resource/language/)文档，了解我们的多语言是如何工作、如何设置以及数据是否支持多语言。
      required: false
      schema:
        type: string
        example: zh
    stormIdQuery:
      name: stormid
      in: query
      description: 需要查询的台风ID，StormID可通过[台风查询API](https://dev.qweather.com/docs/api/tropical-cyclone/storm-list/)获取。例如 `stormid=NP2018`
      required: true
      schema:
        type: string
        example: NP2018
    indexTypeQuery:
      name: type
      in: query
      description: 生活指数的类型ID，包括洗车指数、穿衣指数、钓鱼指数等。可以一次性获取多个类型的生活指数，多个类型用英文`,`分割。例如`type=3,5`。具体生活指数的ID和等级参考[天气指数信息](https://dev.qweather.com/docs/resource/indices-info/)。各项生活指数并非适用于所有城市。
      required: true
      schema:
        type: string
        example: '1'
    localtimeQuery:
      name: localTime
      in: query
      description: 是否返回查询地点的本地时间。**true** 返回本地时间，**false** 返回UTC时间（默认）。
      required: false
      schema:
        type: boolean
        default: false
        example: false
    solarRadiationHoursQuery:
      name: hours
      in: query
      description: 预报小时数，可选1-60，默认`24`。例如： `hours=12`
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 24
        example: 24
    solarRadiationIntervalQuery:
      name: interval
      in: query
      description: 预报数据时间间隔，可选`15`、`30`、`60`分钟，默认`60`。例如：`interval=15`
      required: false
      schema:
        type: integer
        default: 60
        enum: [15, 30, 60]
        example: 60
    solarRadiationTiltQuery:
      name: tilt
      in: query
      description: 光伏系统的倾斜角度，可选0-90，整数。当`extra=poa`时该参数必传。例如：`tilt=30`
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 90
    solarRadiationAzimuthQuery:
      name: azimuth
      in: query
      description: 光伏系统的方位角，可选0-359，整数，0 = 北。当`extra=poa`时该参数必传。例如：`azimuth=180`
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 359
    solarRadiationExtraQuery:
      name: extra
      in: query
      description: 为当前太阳辐照预报提供的额外信息，可选`weather`（基本天气数据）和`poa`（Plane of array，阵列平面辐照度，必须同时传递`tilt`和`azimuth`），多项使用英文逗号分割。例如：`extra=weather`
      required: false
      schema:
        type: string
    timeQuery:
      name: time
      in: query
      description: 查询时间，格式为HHmm，24时制，例如 `time=1230`
      required: true
      schema:
        type: string
        example: '1230'
    dateQuery:
      name: date
      in: query
      description: 查询日期，格式为yyyyMMdd，例如 `date=20170809`
      required: true
      schema:
        type: string
        example: '20180531'
        format: date
    date10Query:
      name: date
      in: query
      description: 选择日期，最多可选择未来10天（包含今天）的数据。日期格式为yyyyMMdd，例如 `date=20200531`
      required: true
      schema:
        type: string
        format: date
        example: '20200531'
    date60Query:
      name: date
      in: query
      description: 选择日期，最多可选择未来60天（包含今天）的数据。日期格式为yyyyMMdd，例如 `date=20200531`
      required: true
      schema:
        type: string
        format: date
        example: '20200531'
    days30Path:
      name: days
      in: path
      description: 预报天数，支持最多30天预报，可选值：`3d`、`7d`、`10d`、`15d`、`30d`
      required: true
      schema:
        type: string
        example: 3d
        enum: [3d, 7d, 10d, 15d, 30d]
    tzQuery:
      name: tz
      in: query
      description: 查询地区所在时区，例如`tz=0800`或`tz=-0530`
      required: true
      schema:
        type: string
        example: '0800'
    altQuery:
      name: alt
      in: query
      description: 海拔高度，单位为米，例如`alt=43`
      required: true
      schema:
        type: number
        example: 43
    days3Path:
      name: days
      in: path
      description: 预报天数，支持最多3天预报，可选值：`1d`、`3d`
      required: true
      schema:
        type: string
        example: 1d
        enum: [1d, 3d]
    hours168Path:
      name: hours
      in: path
      description: 预报小时数，支持最多168小时预报，可选值：`24h`、`72h`、`168h`
      required: true
      schema:
        type: string
        example: 24h
        enum: [24h, 72h, 168h]
    hours72Path:
      name: hours
      in: path
      description: 预报小时数，支持最多72小时预报，可选值：`24h`、`72h`
      required: true
      schema:
        type: string
        example: 24h
        enum: [24h, 72h]
    basinQuery:
      name: basin
      in: query
      description: |-
        需要查询的台风所在的流域，例如中国处于西北太平洋，即 `basin=NP`。当前仅支持`NP`。
        - `AL` North Atlantic 北大西洋
        - `EP` Eastern Pacific 东太平洋
        - `NP` NorthWest Pacific 西北太平洋
        - `SP` SouthWestern Pacific 西南太平洋
        - `NI` North Indian 北印度洋
        - `SI` South Indian 南印度洋
      required: true
      schema:
        type: string
        example: NP
        enum: [NP]
    stormYearQuery:
      name: year
      in: query
      description: 支持查询本年度和上一年度的台风，例如：`year=2020`, `year=2019`
      required: true
      schema:
        type: number
        example: 2023
    pidQuery:
      name: project
      in: query
      description: 指定项目ID以查看该项目的请求量统计。`project`与`credential`互斥。
      required: false
      schema:
        type: string
        example: project_123
    kidQuery:
      name: cred
      in: query
      description: 指定凭据ID以查看该凭据的请求量统计。`credential`与`project`互斥。
      required: false
      schema:
        type: string
        example: cred_abc
    radiusQuery:
      name: radius
      in: query
      required: false
      description: 搜索半径，范围为1-50公里，默认为5公里。
      schema:
        type: number
        minimum: 1
        maximum: 50
        default: 5
        example: 10
    unitQuery:
      name: unit
      in: query
      required: false
      description: 数据单位，可选 `m`（公制，默认）或 `i`（英制）。
      schema:
        type: string
        enum: [m, i]
        default: m
        example: m
    days7Path:
      name: days
      in: path
      required: true
      description: 预报天数，可选 `3d` 或 `7d`。
      schema:
        type: string
        enum: [3d, 7d]
        example: 3d
    historicalDateQuery:
      name: date
      in: query
      required: true
      description: 最近10天内的日期，不包含今天，格式为 `yyyyMMdd`。
      schema:
        type: string
        example: '20200725'
  schemas:
    asOf:
      type: string
      description: 当前数据的截止日期
      format: date-time
    referObject:
      type: object
      description: 数据来源和许可信息
      properties:
        sources:
          type: array
          description: 原始数据来源，或数据源说明，可能为空
          nullable: true
          items:
            type: string
        license:
          type: array
          description: 数据许可或版权声明，可能为空
          nullable: true
          items:
            type: string
    metaTagObject:
      type: object
      properties:
        tag:
          type: string
          description: 数据唯一标识
    metaObsObject:
      type: object
      properties:
        observationTime:
          type: string
          description: 数据的实际观测时间
          format: date-time
    metaAttributeObject:
      type: object
      properties:
        attributions:
          type: array
          items:
            type: string
            description: 数据归因信息、URL或声明，必须与当前数据共同显示
          description: 数据归因信息，必须与当前数据共同显示
    metaZeroObject:
      type: object
      properties:
        zeroResult:
          type: boolean
          description: "**true** 表示请求成功，但无数据返回，例如查询地点无预警"
          default: false

    getCityLookup:
      type: object

        warning:
          allOf:
          - "$ref": "#/components/schemas/warningArray"
          description: 预警信息列表
        refer:
          "$ref": "#/components/schemas/referObject"
    warningArray:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: 本条预警的唯一标识，可判断本条预警是否已经存在

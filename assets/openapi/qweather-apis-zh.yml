                  type: number
        errors:
          type: array
          description: 错误的请求数据
          items:
            type: object
            properties:
              api:
                type: string
                description: 错误请求的API名称
              hours:
                type: array
                description: 最近24小时每小时的错误请求量，结束时间以`asOf`为准。例如 asOf=2025-03-20T09:59Z 则数组中的最后一条数据代表09:00 ～ 09:59（UTC）的请求量
                items:
                  type: number


          allOf:
          - "$ref": "#/components/schemas/metaTagObject"
          - "$ref": "#/components/schemas/metaZeroObject"
          - "$ref": "#/components/schemas/metaAttributeObject"
          description: 当前响应的元数据
        alerts:
          type: array
          description: 预警信息列表
          items:
            type: object
            properties:
              id:
                type: string
                description: 本条预警信息的唯一标识
              senderName:
                type: string
                description: 预警发布机构的名称，可能为空
                nullable: true
              issuedTime:
                type: string
                format: date-time
                description: 原始预警信息生成的时间，实际发布或接收时间会略有延迟
              messageType:
                type: object
                description: "[预警信息的性质](https://dev.qweather.com/docs/resource/warning-info/#message-type)，开发者可以了解当前预警是新发布的还是对之前预警的更新"
                properties:
                  code:
                    type: string
                    enum: [alert, update, cancel]
                    description: "性质的代码"
                  supersedes:
                    type: array
                    description: 当前预警取代或取消后续预警ID的列表，当这是一条新预警信息时，返回为空
                    items:
                      type: string
              eventType:
                type: object
                description: "[预警事件类型](https://dev.qweather.com/docs/resource/warning-info/#event-and-code)"
                properties:
                  name:
                    type: string
                    description: 事件名称
                  code:
                    type: string
                    description: 事件代码
              urgency:
                type: string
                description: 预警信息的[紧迫程度](https://dev.qweather.com/docs/resource/warning-info/#urgency)，可能为空
                nullable: true
              severity:
                type: string
                description: 预警信息的[严重程度](https://dev.qweather.com/docs/resource/warning-info/#severity)
              certainty:
                type: string
                description: 预警信息的[确定性或可信度](https://dev.qweather.com/docs/resource/warning-info/#certainty)，可能为空
                nullable: true
              icon:
                type: string
                description: 预警对应的[图标代码](https://dev.qweather.com/docs/resource/icons/)
              color:
                description: 预警信息 RGBA 颜色表示
                allOf:
                  - properties:
                      code:
                        type: string
                        description: "[颜色代码](https://dev.qweather.com/docs/resource/warning-info/#color)"
                        enum: [white, gray, green, blue, yellow, amber, orange, red, purple, black]
                  - "$ref": "#/components/schemas/colorObject"
              effectiveTime:
                type: string
                format: date-time
                description: 预警信息的生效时间，可能为空
              onsetTime:
                type: string
                format: date-time
                description: 预警事件预计开始的时间，可能为空
              expireTime:
                type: string
                format: date-time
                description: 预警信息的失效时间
              headline:
                type: string
                description: 预警信息的简要描述或标题
              description:
                type: string
                description: 预警信息的详细描述
              criteria:
                type: string
                nullable: true
                description: 当前预警信息的触发标准或条件。仅供参考，可能滞后于官方标准。可能为空
              responseTypes:
                type: array
                description: 对当前预警的应对方式的类型代码，可能为空
                nullable: true
                items:
                  type: string
              instruction:
                type: string
                description: 对当前预警的防御指南或行动指导，可能为空
                nullable: true
    colorObject:
      type: object
      description: 数据 RGBA 颜色表示
      properties:
        red:
          type: number
          description: 红色分量值（RGBA），范围 0–255
        green:
          type: number
          description: 绿色分量值（RGBA），范围 0–255
        blue:
          type: number
          description: 蓝色分量值（RGBA），范围 0–255
        alpha:
          type: number
          description: 透明度分量值（RGBA），范围 0-1
          nullable: true
    getWarning:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        updateTime:
          "$ref": "#/components/schemas/updateTime"
        fxLink:

          type: string
          description: Solar time, HHmm format
        hourAngle:
          type: string
          description: Hour Angle
        refer:
          "$ref": "#/components/schemas/referObject"

    getMoon:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        updateTime:
          "$ref": "#/components/schemas/updateTime"
        fxLink:
          "$ref": "#/components/schemas/fxLink"
        moonrise:
          type: string
          nullable: true
          description: "[Moonrise time](https://dev.qweather.com/en/docs/resource/sun-moon-info/#moonrise-and-moonset) of current day. Maybe null"
        moonset:
          type: string
          nullable: true
          description: "[Moonset time](https://dev.qweather.com/en/docs/resource/sun-moon-info/#moonrise-and-moonset) of current day. Maybe null"

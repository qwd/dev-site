          year:
            type: string
            description: Year of the storm
          isActive:
            type: string
            description: Whether it is an active storm? `1` = Active and `0` = Stopped
    getTide:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        updateTime:
          "$ref": "#/components/schemas/updateTime"
        fxLink:
          "$ref": "#/components/schemas/fxLink"
        tideTable:
          type: array
          description: Tide table
          items:
            type: object
            properties:
              fxTime:
                "$ref": "#/components/schemas/fxTime"
              height:
                type: string
                description: The height of the wave, in meters
              type:
                type: string
                description: High tide (H) or Low tide (L)
        tideHourly:
          type: array
          description: Hourly tide data
          items:
            type: object
            properties:
              fxTime:
                "$ref": "#/components/schemas/fxTime"
              height:
                type: string
                description: The height of the wave, in meters
        refer:
          "$ref": "#/components/schemas/referObject"

    getSolarRadiation:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        radiation:
          type: array
          description: Hourly solar radiation forecast
          items:
            type: object
            properties:
              fxTime:
                "$ref": "#/components/schemas/fxTime"
              net:
                type: string
                description: Net surface solar radiation, W/m<sup>2</sup>
              diffuse:
                type: string
                description: Diffuse solar radiation, W/m<sup>2</sup>
              direct:
                type: string
                description: Direct solar radiation, W/m<sup>2</sup>
        refer:
          "$ref": "#/components/schemas/referObject"

    getSolarRadiationForecast:
      type: object
      properties:
        metadata:
          allOf:
          - "$ref": "#/components/schemas/metaTagObject"
          description: Response metadata
        forecasts:
          type: array
          description: Solar irradiance forecast data
          items:
            type: object
            properties:
              forecastTime:
                "$ref": "#/components/schemas/fxTime"
              solarAngle:
                type: object
                description: Solar angle
                properties:
                  azimuth:
                    type: number
                    description: Solar azimuth angle, 0 degree for North
                    maximum: 359
                    minimum: 0
                  elevation:
                    type: number
                    description: Solar elevation angle
                    minimum: 0
                    maximum: 90
              dni:
                allOf:
                - "$ref": "#/components/schemas/valueUnitObject"
                description: Direct normal irradiance
              dhi:
                allOf:
                - "$ref": "#/components/schemas/valueUnitObject"
                description: Diffuse horizontal irradiance
              ghi:
                allOf:
                - "$ref": "#/components/schemas/valueUnitObject"
                description: Global horizontal irradiance
              weather:
                type: object
                description: Weather data. Returned only when `extra=weather`
                properties:
                  temperature:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Temperature
                  windSpeed:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Wind speed
                  humidity:
                    type: number
                    description: Relative humidity
              poa:
                type: object
                description: Plane-of-array irradiance. Returned only when `extra=poa`
                properties:
                  global:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Global irradiance for the plane-of-array
                  direct:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Direct solar radiation for the plane-of-array
                  diffuse:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Diffuse solar radiation for the plane-of-array
                  reflected:
                    allOf:
                    - "$ref": "#/components/schemas/valueUnitObject"
                    description: Reflected irradiance for the plane-of-array
    valueUnitObject:
      type: object
      properties:
        value:
          type: number
          description: Value
        unit:
          type: string
          description: Unit
    getSun:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        updateTime:
          "$ref": "#/components/schemas/updateTime"
        fxLink:
          "$ref": "#/components/schemas/fxLink"
        sunrise:
          type: string
          nullable: true
          description: "[Sunrise time](https://dev.qweather.com/en/docs/resource/sun-moon-info/#sunrise-and-sunset). Maybe null in high latitude area"
        sunset:
          type: string
          nullable: true

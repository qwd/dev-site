                type: string
                description: "[Moon phase name](https://dev.qweather.com/en/docs/resource/sun-moon-info/#moon-phase)"
              illumination:
                type: string
                description: Moon illuminance in percent
              icon:
                type: string
                description: "[Icon code](https://dev.qweather.com/en/docs/resource/icons/) for moon phase. See also [QWeather Icons](https://icons.qweather.com/en/)"
        refer:
          "$ref": "#/components/schemas/referObject"

    getFinance:
      type: object
      properties:
        metadata:
          allOf:
          - "$ref": "#/components/schemas/metaTagObject"
          description: Response metadata
        asOf:
          "$ref": "#/components/schemas/asOf"
        currency:
          description: Currency code, including `CNY` and `USD`
          type: string
          enum: [CNY, USD]
        balance:
          description: Account balance
          type: number
        accruedCharges:
          type: object
          description: Accrued Charges
          properties:
            previousDay:
              type: number
              description: Accrued charges in the previous calendar day
            thisMonth:
              type: number
              description: Accrued charges in the current calendar month
            sinceLastBill:
              type: number
              description: Accrued charges since the last bill
        pendingBills:
          description: Pending bill list
          type: array
          items:
            type: object
            properties:
              number:
                type: string
                description: Bill number
              date:
                type: string
                format: date-time
                description: The issue date of the bill
              type:
                type: string
                enum: [subscription, savingPlans, resourcePlans]
                description: The type of bill
              status:
                type: string
                enum: [unpaid, overdue]
                description: Payment status of the bill, including `unpaid`, `outstanding` and `overdue`
              amount:
                type: number
                description: Total amount of the bill
              amountDue:
                type: number
                description: The unpaid portion of the bill that is still due
              dueDate:
                type: string
                format: date-time
                description: The due date for the bill payment
        availableSavingsPlans:
          type: array
          description: Available savings plan list
          items:
            type: object
            properties:
              billNumber:
                type: string
                description: Bill number
              status:
                type: string
                enum: [pending, active]
                description: Status of the savings plan, including `pending` and `active`
              term:
                type: string
                description: Duration of the savings plan commitment, default is 1 year
              commitments:
                type: number
                description: Total committed amount under the savings plan
              utilized:
                type: number
                description: Committed amount that has been utilized
              effectiveTime:
                type: string
                format: date-time
                description: Time when the savings plan becomes effective
        availableResourcePlans:
          type: array
          description: Available resource plan list
          items:
            type: object
            properties:
              billNumber:
                type: string
                description: Bill number
              status:
                type: string
                enum: [pending, active]
                description: Status of the resource plan, including `pending` and `active`
              requests:
                type: number
                description: Total request volume included in the resource plan
              utilized:
                type: number
                description: Number of requests used from the resource plan
              effectiveTime:
                type: string
                format: date-time
                description: Time when the resource plan becomes effective

    getStats:
      type: object
      properties:
        metadata:
          allOf:
          - "$ref": "#/components/schemas/metaTagObject"

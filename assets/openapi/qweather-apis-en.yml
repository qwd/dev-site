---
openapi: 3.0.0
info:
  title: QWeather APIs
  description: QWeather API reference.
  version: latest
  termsOfService: https://www.qweather.com/terms/developers-eula
  contact:
    name: QWeather Developer Services
    url: https://dev.qweather.com
  license:
    name: Developers End User License Agreement
    url: https://www.qweather.com/terms/developers-eula
servers:
- url: https://{API Host}
  description: Enter your API Host below.
  variables:
    API Host:
      default: 'abc.xyz.qweatherapi.com'
      description: Find your API Host in the Console settings.
security:
- jwt: []
- apiKey: []
tags:
- name: Geo
  description: Location lookup and city search.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/geoapi/
- name: Weather
  description: Weather data for a specified location.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/weather/
- name: Weather Alert
  description: Official severe weather alerts.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/warning/
- name: Air Quality
  description: Air quality data for a specified location.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/air-quality/
- name: Storm
  description: Tropical cyclone data for the seas near China.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/tropical-cyclone/
- name: Ocean
  description: Tide and ocean current data for major ports and cities worldwide.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/ocean/
- name: Solar Irradiation
  description: Gridded solar irradiance forecasts.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/solar-radiation/
- name: Astronomy
  description: Astronomical data for a specified location.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/astronomy/
- name: Console
  description: Console APIs.
  externalDocs:
    description: Find out more
    url: https://dev.qweather.com/en/docs/api/console/
paths:
  "/geo/v2/city/lookup":
    get:
      operationId: getGeoCitylookup
      summary: City Lookup
      description: |-
        City Lookup provides reverse geocoding, geolocation lookup services, supports multi-language, fuzzy search and other functions.

        With the City Lookup, you can get the basic information of the city, including the Location ID of the city (you need this ID to get the weather), multilingual name, latitude and longitude, time zone, altitude, rank, administrative, etc.

        In addition, GeoAPI - City Lookup can also help you to implement fuzzy search in your APP, users only need to type 1 or 2 words to get results.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/geoapi/city-lookup/
      tags:
      - Geo
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/admQuery"
      - "$ref": "#/components/parameters/rangeQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getCityLookup"
              examples:
                response:
                  externalValue: "./examples/getGeoCitylookup-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/geo/v2/poi/lookup":
    get:
      operationId: getGeoPoilookup
      summary: POI Lookup
      description: POI Lookup API provides basic information of POI(scenic spot, tide stations, etc.)
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/geoapi/poi-lookup/
      tags:
      - Geo
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/poiTypeQuery"
      - "$ref": "#/components/parameters/poiCityQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getPoiLookup"
              examples:
                response:
                  externalValue: "./examples/getGeoPoilookup-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/now":
    get:
      operationId: getWeatherNow
      tags:
      - Weather
      summary: Real-time Weather
      description: |-
        Get real-time weather data for 500,000+ cities around the world, including temperature, wind, humidity, pressure, precipitation, visibility, etc.

        > **Note:** The real-time data are all near real-time data. Compared with the real physical world, it will be delayed by 5-20 minutes. Please determine the accurate time corresponding to the data according to the `obsTime` in the data.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/weather-now/
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherNow"
              examples:
                response:
                  externalValue: "./examples/getWeatherNow-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/{days}":
    get:
      operationId: getWeatherDailyForecast
      tags:
      - Weather
      summary: Weather Daily Forecast
      description: Get weather daily forecasts for the next 3-30 days for cities around the world.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/weather-daily-forecast/
      parameters:
      - "$ref": "#/components/parameters/days30Path"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherDaily"
              examples:
                response:
                  externalValue: "./examples/getWeatherDailyForecast-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/weather/{hours}":
    get:
      operationId: getWeatherHourlyForecast
      tags:
      - Weather
      summary: Weather Hourly Forecast
      description: Get hourly weather forecasts for cities around the world for the next 24-168 hours.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/weather-hourly-forecast/
      parameters:
      - "$ref": "#/components/parameters/hours168Path"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherHourly"
              examples:
                response:
                  externalValue: "./examples/getWeatherHourlyForecast-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/minutely/5m":
    get:
      operationId: getMinutelyPrecipitation
      tags:
      - Weather
      summary: Minutely Precipitation
      description: |-
        Get minute-level precipitation forecast data every 5 minutes for the next 2 hours in China.

        > This data is only supported for Chinese cities.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/minutely/minutely-precipitation/
      parameters:
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getMinutely"
              examples:
                response:
                  externalValue: "./examples/getMinutelyPrecipitation-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/indices/{days}":
    get:
      operationId: getWeatherIndices
      tags:
      - Weather
      summary: Weather Indices Forecast
      description: |-
        Get weather indices forecast data for cities in China and around the world.

        - Weather Indices in China: Comfort Indices, Car Wash Indices, Dressing Indices, Cold Indices, Sports Indices, Travel Indices, UV Indices, Air Pollution Indices, Air Conditioning Indices, Allergy Indices, Sunglasses Indices, Makeup Indices, Sunshine Indices, Traffic Indices, Fishing Indices, Sun Protection Indices
        - Weather Indices worldwide: Sports Indices, Car Wash Indices, UV Indices, Fishing Indices
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/indices/indices-forecast/
      parameters:
      - "$ref": "#/components/parameters/days3Path"
      - "$ref": "#/components/parameters/indexTypeQuery"
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWeatherIndex"
              examples:
                response:
                  externalValue: "./examples/getWeatherIndices-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/weatheralert/v1/current/{latitude}/{longitude}":
    get:
      operationId: getWeatherAlertCurrent
      tags:
      - Weather Alert
      summary: Weather Alert
      description: |-
        Get officially issued real-time severe weather alert data around the world.

        > **Hint:** For the implementation of weather alert, see [Resource - Alert Info](https://dev.qweather.com/en/docs/resource/warning-info/) in advance.
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/localtimeQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAlert"
              examples:
                response:
                  externalValue: "./examples/getWeatherAlertCurrent-en.json"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/warning/weather-alert/
  "/v7/warning/now":
    get:
      operationId: getWarningNow
      tags:
      - Weather Alert
      summary: Legacy Weather Warning
      description: This API is deprecated and will be discontinued on September 1, 2026. Use `/weatheralert/v1/current/` instead.
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getWarning"
              examples:
                response:
                  externalValue: "./examples/getWarningNow-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/current/{latitude}/{longitude}":
    get:
      operationId: getAirqualityCurrent
      tags:
      - Air Quality
      summary: Current Air Quality
      description: |-
        The current air quality (AQI) API provides real-time air quality data for specified locations, data resolution is 1x1 km.

        - AQI, category, color and primary pollutant based on local standards for each country or region
        - Generic QWeather AQI
        - Pollutant concentration values and their sub-index.
        - Health effects and advice
        - Associated monitoring station information

        We recommend to read [Air Quality Info](https://dev.qweather.com/en/docs/resource/air-info/) to learn about the AQIs, pollutants, supported regions and more.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/air-quality/air-current/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityCurrent"
              examples:
                response:
                  externalValue: "./examples/getAirqualityCurrent.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/daily/{latitude}/{longitude}":
    get:
      operationId: getAirqualityDailyForecast
      tags:
      - Air Quality
      summary: Air Quality Daily Forecast
      description: |-
        Air quality (AQI) dailay forecasts, pollutants, and health advice for the next 3 days.

        We recommend to read [Air Quality Info](https://dev.qweather.com/en/docs/resource/air-info/) to learn about the AQIs, pollutants, supported regions and more.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/air-quality/air-daily-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityDaily"
              examples:
                response:
                  externalValue: "./examples/getAirqualityDailyForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/hourly/{latitude}/{longitude}":
    get:
      operationId: getAirqualityHourlyForecast
      tags:
      - Air Quality
      summary: Air Quality Hourly Forecast
      description: |-
        The air quality hourly forecast API provides air quality forecast data for each hour of the next 24 hours, including AQI, pollutants concentration, sub-indexes, health effects and advice.

        We recommend to read [Air Quality Info](https://dev.qweather.com/en/docs/resource/air-info/) to learn about the AQIs, pollutants, supported regions and more.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/air-quality/air-hourly-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirQualityHourly"
              examples:
                response:
                  externalValue: "./examples/getAirqualityHourlyForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/airquality/v1/stations/{locationId}":
    get:
      operationId: getAirqualityAirStation
      tags:
      - Air Quality
      summary: Monitoring Station Data
      description: |-
        Monitoring Station Data API provides pollutant concentration values from air quality monitoring stations in each country or region.

        > **Warning:** Monitoring station data is for reference only, it may be delayed, incorrect or unavailable due to various reasons such as failure, removal, maintenance or local laws and regulations.
        {.bqdanger}
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/air-quality/air-station/
      parameters:
      - "$ref": "#/components/parameters/airStationIdPath"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAirStation"
              examples:
                response:
                  externalValue: "./examples/getAirqualityAirStation.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/air/now":
    get:
      operationId: getAirNowV7
      tags:
      - Air Quality
      summary: Legacy Current Air Quality
      description: This API is deprecated and will be discontinued on June 1, 2026. Use `/airquality/v1/current` instead.
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAqiNowV7"
              examples:
                response:
                  externalValue: "./examples/getAirNowV7-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/air/5d":
    get:
      operationId: getAirDailyV7
      tags:
      - Air Quality
      summary: Legacy Air Quality Daily Forecast
      description: This API is deprecated and will be discontinued on June 1, 2026. Use `/airquality/v1/daily` instead.
      deprecated: true
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getAqiDailyV7"
              examples:
                response:
                  externalValue: "./examples/getAirDailyV7-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/tropical/storm-forecast":
    get:
      operationId: getStormForecast
      tags:
      - Storm
      summary: Storm Forecast
      description: |-
        Storm Forecast API provides tropical cyclones information for a specific tropical cyclone, the data including forecast tropical cyclones location, level, pressure, wind and etc.

        > **Note:** For inactive storms, the returned data is **NULL**, please get the storms status by [Storm List API](https://dev.qweather.com/en/docs/api/tropical-cyclone/storm-list/) first.
      parameters:
      - "$ref": "#/components/parameters/stormIdQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormForecast"
              examples:
                response:
                  externalValue: "./examples/getStormForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/tropical-cyclone/storm-forecast/
  "/v7/tropical/storm-track":
    get:
      operationId: getStormTrack
      tags:
      - Storm
      summary: Storm Track
      description: Get the tropical cyclones location, level, pressure, windspeed, and track path of active storm in major ocean basins around the world.
      parameters:
      - "$ref": "#/components/parameters/stormIdQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormTrack"
              examples:
                response:
                  externalValue: "./examples/getStormTrack.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/tropical-cyclone/storm-track/
  "/v7/tropical/storm-list":
    get:
      operationId: getStormList
      tags:
      - Storm
      summary: Storm List
      description: |-
        Get a list of tropical cyclones for the last 2 years in major ocean basins around the world.

        > Only the coastal areas of China are supported now, i.e. `basin=NP`
      parameters:
      - "$ref": "#/components/parameters/basinQuery"
      - "$ref": "#/components/parameters/stormYearQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStormList"
              examples:
                response:
                  externalValue: "./examples/getStormList-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/tropical-cyclone/storm-list/
  "/v7/ocean/tide":
    get:
      operationId: getOceanTide
      tags:
      - Ocean
      summary: Tide
      description: Global tidal data for the next 10 days, including tide table and hourly tide forecast data.
      parameters:
      - "$ref": "#/components/parameters/tideStationIdQuery"
      - "$ref": "#/components/parameters/date10Query"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getTide"
              examples:
                response:
                  externalValue: "./examples/getOceanTide.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/ocean/tide/
  "/solarradiation/v1/forecast/{latitude}/{longitude}":
    get:
      operationId: getSolarradiationForecast
      tags:
      - Solar Irradiation
      summary: Solar Radiation Forecast
      description: Provide solar radiation forecasts and related data at 15-minute intervals for any location worldwide, up to 60 hours ahead, with a spatial resolution of 1×1 km.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/solar-radiation/solar-radiation-forecast/
      parameters:
      - "$ref": "#/components/parameters/latPath"
      - "$ref": "#/components/parameters/lonPath"
      - "$ref": "#/components/parameters/solarRadiationHoursQuery"
      - "$ref": "#/components/parameters/solarRadiationIntervalQuery"
      - "$ref": "#/components/parameters/solarRadiationTiltQuery"
      - "$ref": "#/components/parameters/solarRadiationAzimuthQuery"
      - "$ref": "#/components/parameters/solarRadiationExtraQuery"
      - "$ref": "#/components/parameters/localtimeQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getSolarRadiationForecast"
              examples:
                response:
                  externalValue: "./examples/getSolarradiationForecast.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/solar-radiation/{hours}":
    get:
      operationId: getSolarRadiationV7
      tags:
      - Solar Irradiation
      summary: Legacy Solar Radiation
      deprecated: true
      description: This API is deprecated and will be discontinued on December 31, 2026. Use `/solarradiation/v1/forecast/` instead.
      parameters:
      - "$ref": "#/components/parameters/hours72Path"
      - "$ref": "#/components/parameters/lonlatQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getSolarRadiation"
              examples:
                response:
                  externalValue: "./examples/getSolarRadiationV7.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/astronomy/moon":
    get:
      operationId: getAstronomyMoon
      tags:
      - Astronomy
      summary: Moon and Moon Phase
      description: Get moonrise and moonset and hourly moon phase data for the next 60 days at any location worldwide.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/astronomy/moon-and-moon-phase/
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/date60Query"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getMoon"
              examples:
                response:
                  externalValue: "./examples/getAstronomyMoon-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/astronomy/sun":
    get:
      operationId: getAstronomSun
      tags:
      - Astronomy
      summary: Sunrise and Sunset
      description: Get the sunrise and sunset times for the next 60 days at any location worldwide.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/astronomy/sunrise-sunset/
      parameters:
      - "$ref": "#/components/parameters/locationQuery"
      - "$ref": "#/components/parameters/date60Query"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getSun"
              examples:
                response:
                  externalValue: "./examples/getAstronomSun.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/astronomy/solar-elevation-angle":
    get:
      operationId: getAstronomySolarElevationAngle
      tags:
      - Astronomy
      summary: Solar Elevation Angle
      description: Get global solar elevation angle and azimuth.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/astronomy/solar-elevation-angle/
      parameters:
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/dateQuery"
      - "$ref": "#/components/parameters/timeQuery"
      - "$ref": "#/components/parameters/tzQuery"
      - "$ref": "#/components/parameters/altQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getSolarAngles"
              examples:
                response:
                  externalValue: "./examples/getAstronomySolarElevationAngle.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/finance/v1/summary":
    get:
      operationId: getConsoleFinance
      tags:
      - Console
      summary: Finance Summary
      description: |-
        Retrieve your financial and billing summary.

        > **Hint:** The data returned is as of the previous hour or earlier, it may be delayed from the data displayed in the Console.

        ## Privileges

        This API requires the account owner to enable permissions for the credentials in the Console.

        1. [Go to Console - Project](https://console.qweather.com/project)
        2. Click on the credential that requires the Console API to be enabled.
        3. Scroll down to "Console data privileges".
        4. Check "Allow access to finance summary data".
        5. Click the Save button.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/console/finance/
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getFinance"
              examples:
                response:
                  externalValue: "./examples/getConsoleFinance.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/metrics/v1/stats":
    get:
      operationId: getConsoleStats
      tags:
      - Console
      summary: Stats
      description: |-
        Retrieve your API traffic statistics for the last 24 hours.

        > **Hint:** The data returned is as of the previous hour or earlier, it may be delayed from the data displayed in the Console.

        ## Privileges

        This API requires the account owner to enable permissions for the credentials in the Console.

        1. [Go to Console - Project](https://console.qweather.com/project)
        2. Click on the credential that requires the Console API to be enabled.
        3. Scroll down to "Console data privileges".
        4. Check the desired permissions in "API traffic stats":
           - "Allow access to overall API traffic stats", aggregate all projects and credentials, including deleted.
           - "Allow access to API traffic stats by project", filtered by `project` parameter.
           - “Allow access to API traffic by stats credential”, filtered by `credential` parameter.
        5. Click the Save button.

        Note: deleted projects or credentials cannot be queried individually (such as using filters `project` or `credential`), but their traffic stats are included in the overall aggregation.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/console/stats/
      parameters:
      - "$ref": "#/components/parameters/pidQuery"
      - "$ref": "#/components/parameters/kidQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getStats"
              examples:
                response:
                  externalValue: "./examples/getConsoleStats.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/geo/v2/city/top":
    get:
      operationId: getGeoTopcity
      tags:
      - Geo
      summary: Top City
      description: Get a list of popular cities around the world.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/geoapi/top-city/
      parameters:
      - "$ref": "#/components/parameters/rangeQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getTopCity"
              examples:
                response:
                  externalValue: "./examples/getGeoTopcity-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/geo/v2/poi/range":
    get:
      operationId: getGeoPoirange
      tags:
      - Geo
      summary: POI Range
      description: POI Range API provides the ability to query all POI information within a specified area.
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/geoapi/poi-range/
      parameters:
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/poiTypeQuery"
      - "$ref": "#/components/parameters/radiusQuery"
      - "$ref": "#/components/parameters/numberQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getPoiRange"
              examples:
                response:
                  externalValue: "./examples/getGeoPoirange-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
  "/v7/grid-weather/now":
    get:
      operationId: getGridWeatherNow
      tags:
      - Weather
      summary: Grid Weather Real-time
      description: |-
        Weather forecast data based on numerical models, to provide current weather data at specified coordinates around the world, with a spatial resolution of 3-5 kilometers.

        > **Hint:** The grid weather data is based on Numerical Weather Prediction (NWP) models, and it is not suitable for comparison with observation station data. For station-based city weather data, please refer to the [City Weather API](https://dev.qweather.com/en/docs/api/weather/weather-now/). Grid weather uses UTC+0 as the time zone.
      parameters:
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/langQuery"
      - "$ref": "#/components/parameters/unitQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getGridWeatherNow"
              examples:
                response:
                  externalValue: "./examples/getGridWeatherNow-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/grid-weather-now/
  "/v7/grid-weather/{days}":
    get:
      operationId: getGridWeatherDaily
      tags:
      - Weather
      summary: Grid Weather Daily Forecast
      description: |-
        Weather forecast data based on numerical models, to provide daily weather forecasts at specified coordinates around the world, with a spatial resolution of 3-5 kilometers.

        > **Hint:** The grid weather data is based on Numerical Weather Prediction (NWP) models, and it is not suitable for comparison with observation station data. For station-based city weather data, please refer to the [City Weather API](https://dev.qweather.com/en/docs/api/weather/weather-daily-forecast/). Grid weather uses UTC+0 as the time zone.
      parameters:
      - "$ref": "#/components/parameters/days7Path"
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/langQuery"
      - "$ref": "#/components/parameters/unitQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getGridWeatherDaily"
              examples:
                response:
                  externalValue: "./examples/getGridWeatherDaily-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/grid-weather-daily-forecast/
  "/v7/grid-weather/{hours}":
    get:
      operationId: getGridWeatherHourly
      tags:
      - Weather
      summary: Grid Weather Hourly Forecast
      description: |-
        Weather forecast data based on numerical models, to provide hourly weather forecasts at specified coordinates around the world, with a spatial resolution of 3-5 kilometers.

        > **Hint:** The grid weather data is based on Numerical Weather Prediction (NWP) models, and it is not suitable for comparison with observation station data. For station-based city weather data, please refer to the [City Weather API](https://dev.qweather.com/en/docs/api/weather/weather-hourly-forecast/). Grid weather uses UTC+0 as the time zone.
      parameters:
      - "$ref": "#/components/parameters/hours72Path"
      - "$ref": "#/components/parameters/lonlatQuery"
      - "$ref": "#/components/parameters/langQuery"
      - "$ref": "#/components/parameters/unitQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getGridWeatherHourly"
              examples:
                response:
                  externalValue: "./examples/getGridWeatherHourly-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/weather/grid-weather-hourly-forecast/
  "/v7/historical/weather":
    get:
      operationId: getHistoricalWeather
      tags:
      - Weather
      summary: Time Machine for Weather
      description: "Get the last 10 days of weather history data.\n\n> Let's say, today is December 30, you can get historical data from Dec. 20 to Dec. 29.\n\n> QWeather also provides historical reanalysis weather data from 2000 to present. If you need more historical weather data, please provide the following information to <sales@qweather.com>.\n> \n> * Company name\n> * Contact information\n> * City or coordinates\n> * Date range"
      parameters:
      - "$ref": "#/components/parameters/locationIdQuery"
      - "$ref": "#/components/parameters/historicalDateQuery"
      - "$ref": "#/components/parameters/langQuery"
      - "$ref": "#/components/parameters/unitQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getHistoricalWeather"
              examples:
                response:
                  externalValue: "./examples/getHistoricalWeather-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/time-machine/time-machine-weather/
      x-aliases:
      - "/docs/histroical/histroical-weather/"
  "/v7/historical/air":
    get:
      operationId: getHistoricalAir
      tags:
      - Air Quality
      summary: Time Machine for Air Quality (Deprecated)
      deprecated: true
      description: |-
        Get the last 10 days of air quality history data.

        > Let's say, today is December 30, you can get data from Dec. 20 to Dec. 29.
      parameters:
      - "$ref": "#/components/parameters/locationIdQuery"
      - "$ref": "#/components/parameters/historicalDateQuery"
      - "$ref": "#/components/parameters/langQuery"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/getHistoricalAir"
              examples:
                response:
                  externalValue: "./examples/getHistoricalAir-en.json"
        default:
          "$ref": "#/components/responses/defaultError"
      externalDocs:
        url: https://dev.qweather.com/en/docs/api/time-machine/time-machine-air/
      x-aliases:
      - "/docs/histroical/histroical-air/"
components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
       Fill in the full Token (without the Bearer prefix). See [JWT Docs](https://dev.qweather.com/en/docs/configuration/authentication/#json-web-token). 
       
       Do not use both JWT and API KEY at the same time.
    apiKey:
      type: apiKey
      in: header
      name: X-QW-Api-Key
      description: |
       See [API Key Docs](https://dev.qweather.com/en/docs/configuration/authentication/#api-key). 
       
       Do not use both JWT and API KEY at the same time.
  responses:
    defaultError:
      description: Request failed, see [Error Code](https://dev.qweather.com/en/docs/resource/error-code/).
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              error:
                type: object
                description: Error details.
                properties:
                  status:
                    type: number
                    description: The HTTP status code for this error.
                    enum: [400, 401, 403, 404, 429, 500]
                  type:
                    type: string
                    description: A URL that identifies the error type. Open the URL for more information.
                  title:
                    type: string
                    description: A short description of the error.
                  detail:
                    type: string
                    description: A detailed description of the error.
                  invalidParams:
                    type: array
                    description: The invalid or missing parameters.
                    items:
                      type: string
                      description: An invalid or missing parameter. Returned only for HTTP 400 errors.
  parameters:
    latPath:
      name: latitude
      in: path
      required: true
      description: The latitude of the desired location. Decimal format, up to 2 decimal places. For example `39.92`
      schema:
        type: number
        minimum: -90
        maximum: 90
        example: 39.92
    lonPath:
      name: longitude
      in: path
      description: The longitude of the desired location. Decimal format, up to 2 decimal places. For example `116.41`
      required: true
      schema:
        type: number
        minimum: -180
        maximum: 180
        example: 116.41
    airStationIdPath:
      name: locationId
      in: path
      description: LocationID of air quality monitoring station, LocationID can be obtained by [GeoAPI](https://dev.qweather.com/en/docs/api/geoapi/). For example `P58911`
      required: true
      schema:
        type: string
        example: P58911
    locationQuery:
      name: location
      in: query
      description: 'The location to be queried, support [LocationID](https://dev.qweather.com/en/docs/resource/glossary/#locationid) or comma-separated [longitude and latitude](https://dev.qweather.com/en/docs/resource/glossary/#coordinate) (decimal, up to 2 decimal places), LocationID can be obtained by [GeoAPI](https://dev.qweather.com/en/docs/api/geoapi/). Example: `location=101010100` or `location=116.41,39.92`'
      required: true
      schema:
        type: string
        example: 116.41,39.92
    lonlatQuery:
      name: location
      in: query
      description: The comma-separated [longitude and latitude](https://dev.qweather.com/en/docs/resource/glossary/#coordinate) (decimal, up to 2 decimal places) of the location to be queried. For example `location=116.41,39.92`
      required: true
      schema:
        type: string
        example: 116.41,39.92
    airStationIdQuery:
      name: location
      in: query
      description: The monitoring station [LocationID](https://dev.qweather.com/en/docs/resource/glossary/#locationid), for example `location=P58911`.
      required: true
      schema:
        type: string
        example: P58911
    locationIdQuery:
      name: location
      in: query
      description: "The location to be queried, only support [LocationID](https://dev.qweather.com/en/docs/resource/glossary/#locationid) and LocationID can be obtained by [GeoAPI](https://dev.qweather.com/en/docs/api/geoapi/). For example `location=101010100`"
      required: true
      schema:
        type: string
        example: '101010100'
    colorQuery:
      name: color
      in: query
      description: The color scheme. See [Color Palette](https://dev.qweather.com/en/docs/resource/color-pallet/).
      required: false
      schema:
        type: string
        default: light
        enum: [light, dark, local]
        example: light
    tideStationIdQuery:
      name: location
      in: query
      description: The tide station [LocationID](https://dev.qweather.com/en/docs/resource/glossary/#locationid), for example `location=P66981`.
      required: true
      schema:
        type: string
        example: P66981
    admQuery:
      name: adm
      in: query
      description: Superior administrative divisions of a city, useful for excluding cities with similar names or for filtering results. Example `adm = beijing`
      required: false
      schema:
        type: string
        example: beijing
    rangeQuery:
      name: range
      in: query
      description: 'Set to search only within a certain country or region. The country and region name needs to use [country code ISO 3166](https://dev.qweather.com/en/docs/resource/glossary/#iso-3166). If this parameter is not set, the search range will be all cities. Example: `range=cn`'
      required: false
      schema:
        type: string
        example: cn
    numberQuery:
      name: number
      in: query
      description: Number of the results in response, from 1 to 20, 10 is the default.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 10
        example: 10
    poiTypeQuery:
      name: type
      description: "Choose to search for a certain type of POI. `scenic` for Scenic Spot, `TSTA` for Tide Station"
      in: query
      required: true
      schema:
        type: string
        enum: [scenic, CSTA, TSTA]
        example: scenic
    poiCityQuery:
      name: city
      description: "Search for POI within a given city. The city name can be text or the city's LocationID. The city name is an exact match. It is recommended to use LocaitonID. If the text cannot be matched, the data returned will be empty."
      in: query
      required: false
      schema:
        type: string
        example: '101010100'
    langQuery:
      name: lang
      in: query
      description: Multi-language setting, please see [Language](https://dev.qweather.com/en/docs/resource/language/) to find out how our multi-language works and how to set up.
      required: false
      schema:
        type: string
        example: en
    stormIdQuery:
      name: stormid
      in: query
      description: The storm ID that needs to be queried, StormID can be obtained by [Storm List API](https://dev.qweather.com/en/docs/api/tropical-cyclone/storm-list/), e.g., `stormid=NP2018`
      required: true
      schema:
        type: string
        example: NP2018
    indexTypeQuery:
      name: type
      in: query
      description: Weather indices type ID, including car wash index, clothing index, fishing index, etc. You can get multiple types of weather indices at one time, and multiple types are separated by comma, e.g., `type=3,5`, and all indices type see [Indices Info](https://dev.qweather.com/en/docs/resource/indices-info/).
      required: true
      schema:
        type: string
        example: '1'
    localtimeQuery:
      name: localTime
      in: query
      description: Whether to return local time for the requested location. `true` returns local time; `false` returns UTC time (default).
      required: false
      schema:
        type: boolean
        default: false
        example: false
    solarRadiationHoursQuery:
      name: hours
      in: query
      description: 'Forecast hours, supports 1-60 hours, default is `24`. For example: `hours=12`'
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 24
        example: 24
    solarRadiationIntervalQuery:
      name: interval
      in: query
      description: 'Interval of forecast data, supports `15`, `30`, `60` minutes, default is `60`. For example: `interval=15`'
      required: false
      schema:
        type: integer
        default: 60
        enum: [15, 30, 60]
        example: 60
    solarRadiationTiltQuery:
      name: tilt
      in: query
      description: 'The tilt angle of the PV system (range 0-90, integer). Required when `extra=poa`. For example: `tilt=30`'
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 90
    solarRadiationAzimuthQuery:
      name: azimuth
      in: query
      description: 'The azimuth angle of the PV system (range 0-359, integer, 0 = North). Required when `extra=poa`. For example: `azimuth=180`'
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 359
    solarRadiationExtraQuery:
      name: extra
      in: query
      description: 'Additional information provided for the current solar radiation forecast, optional `weather` (basic weather data) and `poa` (plane of array irradiance, must pass both `tilt` and `azimuth`), multiple items are separated by commas. For example: `extra=weather`'
      required: false
      schema:
        type: string
    timeQuery:
      name: time
      in: query
      description: Set time, format is HHmm, 24-hour, e.g., `time=1230`
      required: true
      schema:
        type: string
        example: '1230'
    dateQuery:
      name: date
      in: query
      description: Set date, format is yyyyMMdd, e.g., `date=20200531`
      required: true
      schema:
        type: string
        example: '20180531'
        format: date
    date10Query:
      name: date
      in: query
      description: 'Set the date, up to 10 days in the future (including today). The date format is yyyyMMdd. Eexample: `date=20200531`'
      required: true
      schema:
        type: string
        format: date
        example: '20200531'
    date60Query:
      name: date
      in: query
      description: 'Set the date, up to 60 days in the future (including today). The date format is yyyyMMdd. Example: `date=20200531`'
      required: true
      schema:
        type: string
        format: date
        example: '20200531'
    days30Path:
      name: days
      in: path
      description: "Forecast days, supports up to 30 days, available value: `3d`, `7d`, `10d`, `15d`, `30d`"
      required: true
      schema:
        type: string
        example: 3d
        enum: [3d, 7d, 10d, 15d, 30d]
    tzQuery:
      name: tz
      in: query
      description: Location time zone, e.g., `tz=0800` or `tz=-0530`
      required: true
      schema:
        type: string
        example: '0800'
    altQuery:
      name: alt
      in: query
      description: Location altitude, in meters, e.g., `alt=43`
      required: true
      schema:
        type: number
        example: 43
    days3Path:
      name: days
      in: path
      description: "Forecast days, supports up to 3 days, available value: `1d`, `3d`"
      required: true
      schema:
        type: string
        example: 1d
        enum: [1d, 3d]
    hours168Path:
      name: hours
      in: path
      description: "Forecast hours, supports up to 168 hours, available value: `24h`, `72h`, `168h`"
      required: true
      schema:
        type: string
        example: 24h
        enum: [24h, 72h, 168h]
    hours72Path:
      name: hours
      in: path
      description: "Forecast hours, supports up to 72 hours, available value: `24h`, `72h`"
      required: true
      schema:
        type: string
        example: 24h
        enum: [24h, 72h]
    basinQuery:
      name: basin
      in: query
      description: |-
        The basin where the storm needs to be queried. For now, only support `NP`.
        - `AL` North Atlantic
        - `EP` Eastern Pacific
        - `NP` NorthWest Pacific
        - `SP` SouthWestern Pacific
        - `NI` North Indian North Indian Ocean
        - `SI` South Indian South Indian Ocean
      required: true
      schema:
        type: string
        example: NP
        enum: [NP]
    stormYearQuery:
      name: year
      in: query
      description: Support to query storm of this year and last year, e.g., `year=2020`
      required: true
      schema:
        type: number
        example: 2023
    pidQuery:
      name: project
      in: query
      description: Specify a Project ID to get its API traffic stats. Do not pass both `project` and `credential` in a single request.
      required: false
      schema:
        type: string
        example: project_123
    kidQuery:
      name: cred
      in: query
      description: Specify a Credential ID to get its API traffic stats. Do not pass both `project` and `credential` a single request.
      required: false
      schema:
        type: string
        example: cred_abc
    radiusQuery:
      name: radius
      in: query
      required: false
      description: Search radius from 1 to 50 kilometers. The default is 5 kilometers.
      schema:
        type: number
        minimum: 1
        maximum: 50
        default: 5
        example: 10
    unitQuery:
      name: unit
      in: query
      required: false
      description: Data unit. Use `m` for metric units (default) or `i` for imperial units.
      schema:
        type: string
        enum: [m, i]
        default: m
        example: m
    days7Path:
      name: days
      in: path
      required: true
      description: Forecast days. Available values are `3d` and `7d`.
      schema:
        type: string
        enum: [3d, 7d]
        example: 3d
    historicalDateQuery:
      name: date
      in: query
      required: true
      description: A date within the most recent 10 days, excluding today, in `yyyyMMdd` format.
      schema:
        type: string
        example: '20200725'
  schemas:
    asOf:
      type: string
      description: The cutoff time for the current data in ISO 8601 UTC format
      format: date-time
    referObject:
      type: object
      description: Data sources and licensing information
      properties:
        sources:
          type: array
          description: Data source and other statements, may be null
          nullable: true
          items:
            type: string
        license:
          type: array
          description: Data license, may be null
          nullable: true
          items:
            type: string
    metaTagObject:
      type: object
      properties:
        tag:
          type: string
          description: Unique tag for this data
    metaObsObject:
      type: object
      properties:
        observationTime:
          type: string
          description: The actual observation time
          format: date-time
    metaAttributeObject:
      type: object
      properties:
        attributions:
          type: array
          items:
            type: string
            description: Data source attribution, URL, or statement that must be displayed with the current data
          description: Data attribution list that must be displayed with the current data
    metaZeroObject:
      type: object
      properties:
        zeroResult:
          type: boolean
          description: "`true` indicates the request is successful but no data is available, e.g. no alert data for the queried location"
          default: false

    getCityLookup:
      type: object
      properties:
        code:
          "$ref": "#/components/schemas/statusCode"
        location:
          "$ref": "#/components/schemas/locationArray"
        refer:
          "$ref": "#/components/schemas/referObject"

    locationArray:
      type: array
      description: Location information list
      items:
        type: object
        properties:
          name:
            type: string
            description: Location Name
          id:
            type: string
            description: Location ID
          lat:
            type: string
            description: Latitude
          lon:
            type: string
            description: Longitude
          adm2:
            type: string
            description: Name of the superior administrative division of the location
          adm1:
            type: string
            description: The first-level administrative area of ​​the location
          country:
            type: string
            description: Country name
          tz:
            type: string
            description: "[Timezone](https://dev.qweather.com/en/docs/resource/glossary/#timezone) for this location"
          utcOffset:
            type: string
            description: The number of hours offset between local time and UTC time, refer to [UTC Offset](https://dev.qweather.com/en/docs/resource/glossary/#utc-offset)
          isDst:
            type: string
            description: Is the location currently on [daylight saving time](https://dev.qweather.com/en/docs/resource/glossary/#daylight-saving-time). `1` for daylight saving time and `0` for not in daylight saving time
          type:
            type: string
            description: Location type
          rank:
            type: string
            description: "[Location rank](https://dev.qweather.com/en/docs/resource/glossary/#rank)"
          fxLink:

                  type: number
        errors:
          type: array
          description: Error data
          items:
            type: object
            properties:
              api:
                type: string
                description: API name of the error requests
              hours:
                type: array
                description: Hourly error requests stats for the last 24 hours, ending at `asOf` (e.g., asOf=2025-03-20T09:59Z means the last array item covers 09:00–09:59 UTC)
                items:
                  type: number
